<article class="book-card">
  <div class="book-card__cover">
    <img class="book-card__cover-img" loading="lazy" alt="" />
    <button type="button" class="book-card__bookmark" aria-label="Add to favorites">
      <span class="material-icons" aria-hidden="true">bookmark_add</span>
    </button>
  </div>
  <div class="book-card__body">
    <h3 class="book-card__title-text"></h3>
    <p class="book-card__author"></p>
    <p class="book-card__year"></p>
  </div>
</article>
