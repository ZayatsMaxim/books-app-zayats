<button
  type="button"
  class="favorites__header"
  aria-expanded="false"
  aria-controls="favoritesPanel"
>

  <span class="favorites__count">0</span>
  <span class="material-icons favorites__expand-icon" aria-hidden="true">expand_more</span>

<div class="favorites__panel-clip" aria-hidden="true">
  <div class="favorites__panel-sizer">
    <div class="favorites__panel" id="favoritesPanel"></div>
  </div>
</div>
